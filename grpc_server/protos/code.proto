syntax = "proto3";

package kgrag.code;

import "kgrag_common.proto";

// Code Management Service
service CodeService {
  rpc CreateCode(CreateCodeRequest) returns (CreateCodeResponse);
  rpc FindSimilarCode(FindSimilarCodeRequest) returns (FindSimilarCodeResponse);
  rpc AnalyzeImpact(AnalyzeImpactRequest) returns (AnalyzeImpactResponse);
  rpc TraceExecutionFlow(TraceExecutionFlowRequest) returns (TraceExecutionFlowResponse);
}

// Create Code
message CreateCodeRequest {
  string code = 1;
  string filename = 2;
  string user_token = 3;
  map<string, string> metadata = 4;
  string request_id = 5;
}

message CreateCodeResponse {
  string status = 1;
  string message = 2;
  string code_id = 3;
  string filename = 4;
  string language = 5;
  string title = 6;
  string summary = 7;
  int32 chunks_count = 8;
  int32 entities_count = 9;
  int32 relationships_count = 10;
  string error_message = 11;
  string error_code = 12;
}

// Find Similar Code
message FindSimilarCodeRequest {
  string query = 1;
  string language = 2;
  string project_id = 3;
  int32 limit = 4;
  string user_token = 5;
}

message CodeResult {
  string entity_id = 1;
  double score = 2;
  string entity_name = 3;
  string entity_type = 4;
  string filename = 5;
  string file_path = 6;
  string language = 7;
  int32 line_start = 8;
  int32 line_end = 9;
  string code_snippet = 10;
  string summary = 11;
  repeated string dependencies = 12;
  int32 complexity = 13;
  bool is_entry_point = 14;
}

message FindSimilarCodeResponse {
  string status = 1;
  repeated CodeResult results = 2;
  int32 total = 3;
  string error_message = 4;
  string error_code = 5;
}

// Analyze Impact
message AnalyzeImpactRequest {
  string entity_name = 1;
  string entity_type = 2;
  string project_id = 3;
  int32 max_depth = 4;
  string user_token = 5;
}

message ImpactPath {
  repeated EntityInfo path = 1;
}

message EntityInfo {
  string name = 1;
  string type = 2;
  string file_path = 3;
  string filename = 4;
  int32 line_start = 5;
  int32 line_end = 6;
  string code_snippet = 7;
}

message AnalyzeImpactResponse {
  string status = 1;
  EntityInfo entity = 2;
  repeated ImpactPath upstream = 3;
  repeated ImpactPath downstream = 4;
  string risk_level = 5;
  int32 upstream_count = 6;
  int32 downstream_count = 7;
  string error_message = 8;
  string error_code = 9;
}

// Trace Execution Flow
message TraceExecutionFlowRequest {
  string entry_point = 1;
  string project_id = 2;
  int32 max_depth = 3;
  string user_token = 4;
}

message ExecutionPath {
  repeated EntityInfo path = 1;
  int32 depth = 2;
}

message TraceExecutionFlowResponse {
  string status = 1;
  repeated ExecutionPath paths = 2;
  int32 total_paths = 3;
  string error_message = 4;
  string error_code = 5;
}
