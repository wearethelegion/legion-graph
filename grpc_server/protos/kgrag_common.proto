syntax = "proto3";

package kgrag.common;

// Shared message types across services

message ErrorResponse {
  bool is_error = 1;
  string error = 2;
  string error_code = 3;
  bool retryable = 4;
}

message QueryResult {
  string id = 1;
  string text = 2;
  map<string, string> metadata = 3;
  double score = 4;
  double vector_score = 5;
  double rerank_score = 6;
}
